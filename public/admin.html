<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0a1f44,#081733,#050d1f);
    background-size:300% 300%;
    animation:backgroundMove 18s ease infinite;
    color:white;
    height:100vh;
    overflow:hidden;
}

@keyframes backgroundMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== NAVBAR ===== */

nav{
    height:6rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background:rgba(10,25,60,0.6);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(0,191,255,0.4);
}

.nav-center{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.college-name{
    font-family:'Orbitron',sans-serif;
    letter-spacing:3px;
    color:#00bfff;
    animation:pulseGlow 6s ease-in-out infinite;
}

@keyframes pulseGlow{
0%{opacity:0.7;text-shadow:0 0 4px rgba(0,191,255,0.3);}
50%{opacity:1;text-shadow:0 0 18px rgba(0,191,255,0.8);}
100%{opacity:0.7;text-shadow:0 0 4px rgba(0,191,255,0.3);}
}

/* ===== HERO ===== */

.hero{
    position:relative;
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#matrixCanvas{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0.18;
}

/* ===== ADMIN BOX ===== */

.admin-box{
    position:relative;
    z-index:2;
    background:rgba(10,20,40,0.5);
    padding:40px;
    border-radius:20px;
    border:1px solid rgba(0,191,255,0.4);
    box-shadow:0 0 25px rgba(0,191,255,0.3);
    width:420px;
}

.admin-box h2{
    font-family:'Orbitron',sans-serif;
    margin-bottom:25px;
    letter-spacing:3px;
}

.admin-box input,
.admin-box select{
    width:100%;
    padding:12px;
    margin:12px 0;
    border-radius:8px;
    border:none;
    font-size:16px;
}

.admin-box button{
    width:100%;
    padding:14px;
    margin-top:15px;
    background:linear-gradient(45deg,#005eff,#003d99);
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.admin-box button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00bfff;
}

</style>
</head>

<body>

<nav>
<div></div>
<div class="nav-center">
<h3 class="college-name">SURANA COLLEGE (AUTONOMOUS)</h3>
</div>
<div></div>
</nav>

<div class="hero">
<canvas id="matrixCanvas"></canvas>

<div class="admin-box">
<h2 id="decryptText">ADMIN PANEL</h2>

<input type="text" id="title" placeholder="Event Name">

<input type="number" id="year" placeholder="Year (Ex: 2026)">

<select id="department">
<option value="">Select Department</option>
<option value="MCA">MCA</option>
<option value="MBA">MBA</option>
<option value="MSC">MSC</option>
</select>

<input type="time" id="duration" step="60">

<button type="button" id="createBtn">Create Event</button>
</div>
</div>

<script>

/* ===== CREATE EVENT FUNCTION ===== */



document.getElementById("createBtn").addEventListener("click", async function(){

    const title = document.getElementById("title").value;
    const year = document.getElementById("year").value;
    const department = document.getElementById("department").value;
    const timeValue = document.getElementById("duration").value;

    if(!title || !year || !department || !timeValue){
        alert("Fill all fields");
        return;
    }

    const parts = timeValue.split(":");
    const totalMinutes = (Number(parts[0]) * 60) + Number(parts[1]);

    try {

        await fetch("http://localhost:5000/event/create", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                title,
                year,
                department,
                totalMinutes
            })
        });

        window.location.href = "/index.html";

    } catch(err) {
        alert("Backend not reachable");
        console.error(err);
    }

});



/* ===== MATRIX EFFECT ===== */

const canvas=document.getElementById("matrixCanvas");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize=16;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function drawMatrix(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00bfff";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
drops[i]++;
}}

setInterval(drawMatrix,50);

/* ===== DECRYPT EFFECT ===== */

function decryptEffect(element){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const original=element.innerText;

setInterval(()=>{
let iterations=0;
const interval=setInterval(()=>{
element.innerText=original.split("")
.map((letter,index)=>{
if(index<iterations) return original[index];
return chars[Math.floor(Math.random()*chars.length)];
}).join("");

if(iterations>=original.length) clearInterval(interval);
iterations+=1/3;
},30);
},4000);
}

decryptEffect(document.getElementById("decryptText"));

</script>

</body>
</html>
