<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hackathon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0a1f44,#081733,#050d1f);
    background-size:300% 300%;
    animation:backgroundMove 18s ease infinite;
    color:white;height:100vh;overflow:hidden;
}
@keyframes backgroundMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
nav{
    height:6rem;display:flex;justify-content:space-between;
    align-items:center;padding:15px 50px;
    background:rgba(10,25,60,0.6);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(0,191,255,0.4);
}
.nav-center{position:absolute;left:50%;transform:translateX(-50%);}
.college-name{
    font-family:'Orbitron',sans-serif;
    letter-spacing:3px;color:#00bfff;
    animation:pulseGlow 6s ease-in-out infinite;
}
@keyframes pulseGlow{
0%{opacity:0.7;text-shadow:0 0 4px rgba(0,191,255,0.3);}
50%{opacity:1;text-shadow:0 0 18px rgba(0,191,255,0.8);}
100%{opacity:0.7;text-shadow:0 0 4px rgba(0,191,255,0.3);}
}
.nav-left{display:flex;align-items:center;gap:20px;}
.nav-left img{width:85px;height:55px;border-radius:30%;transition:0.3s;}
.nav-left img:hover{transform:scale(1.05);filter:drop-shadow(0 0 8px #00bfff);}
.round-logo{border-radius:50%;width:75px;height:75px;object-fit:cover;}
.rules-btn{
    background:linear-gradient(145deg,rgba(15,35,75,0.9),rgba(8,20,50,0.95));
    border:1px solid rgba(0,191,255,0.5);
    padding:10px 28px;color:white;font-weight:600;
    border-radius:30px;cursor:pointer;
}
.hero{position:relative;height:80vh;display:flex;
flex-direction:column;justify-content:center;align-items:center;text-align:center;}
#matrixCanvas{position:absolute;width:100%;height:100%;opacity:0.18;}
.hero-content{position:relative;z-index:2;}
.hero h2{font-family:'Orbitron',sans-serif;letter-spacing:4px;color:#cfd8ff;}
.INNOVESTA{font-size:42px;background:linear-gradient(90deg,#00bfff,#fff);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero h1{
font-family:'Orbitron',sans-serif;font-size:100px;
background:linear-gradient(90deg,#00bfff,#fff,#ff2a2a);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
animation:glowPulse 3s ease-in-out infinite alternate;
}
@keyframes glowPulse{
from{text-shadow:0 0 20px rgba(0,191,255,0.6);}
to{text-shadow:0 0 45px rgba(255,0,0,0.7);}
}
.timer-box{
margin-top:30px;padding:18px 45px;border:2px solid #00bfff;
font-size:48px;border-radius:14px;letter-spacing:6px;
background:rgba(0,191,255,0.05);
}
.start-btn{
margin-top:30px;padding:14px 40px;
background:linear-gradient(45deg,#005eff,#003d99);
border:none;color:white;font-size:18px;
border-radius:8px;cursor:pointer;
}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;}
.modal{position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111a30;color:white;width:420px;
padding:30px;border-radius:12px;display:none;}
.blur-bg{filter:blur(8px);}
#timeUpAlert{
    margin-top:25px;
    font-size:48px;
    font-family:'Orbitron',sans-serif;
    color:#ff0000;
    text-shadow:0 0 20px red, 0 0 40px red;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}
</style>
</head>

<body>

<nav>
<div class="nav-left">
<img src="SEI LOGO (1).png">
<img class="round-logo" src="csi_innovesta.jpg">
<img src="innovesta_logo_1.png">
</div>
<div class="nav-center">
<h3 class="college-name">SURANA COLLEGE (AUTONOMOUS)</h3>
</div>
<button class="rules-btn" onclick="openModal()">Rules & Regulations</button>
</nav>

<div class="hero">
<canvas id="matrixCanvas"></canvas>

<div class="hero-content">
<h2 id="eventTitle"></h2>
<h2 id="deptLine"></h2>
<h2 id="accreditationLine">(NBA ACCREDITED)</h2>
<h2 class="INNOVESTA" id="decryptText"></h2>
<h1 id="decryptMain"></h1>
<div class="timer-box" id="timer">08:00:00</div>
<div id="timeUpAlert" style="display:none;">⛔ TIME UP ⛔</div>
<button class="start-btn" id="startBtn" onclick="startTimer()">Start</button>
<button class="start-btn" id="breakBtn" style="display:none;" onclick="toggleBreak()">Break</button>
</div>
</div>

<div class="overlay" id="overlay"></div>

<script>

/* =========================
   GLOBAL VARIABLES
========================= */

let totalSeconds = 0;
let timerInterval = null;
let isPaused = false;

/* =========================
   LOAD EVENT FROM BACKEND
========================= */

async function loadEvent(){
    try{
        const res = await fetch("/event/current");
        const data = await res.json();

        if(!data){
            document.getElementById("eventTitle").innerText = "No Event Created";
            return;
        }

        // Only these lines update
        document.getElementById("deptLine").innerText =
            "DEPARTMENT OF " + data.department;

        document.getElementById("decryptText").innerText =
            "INNOVESTA " + data.year;

        document.getElementById("decryptMain").innerText =
            data.title;

        totalSeconds = data.remainingSeconds;
        updateDisplay();

    }catch(err){
        console.log("Backend not reachable");
    }
}

/* =========================
   TIMER DISPLAY
========================= */

function updateDisplay(){
    let h = Math.floor(totalSeconds/3600);
    let m = Math.floor((totalSeconds%3600)/60);
    let s = totalSeconds%60;

    document.getElementById("timer").innerText =
        String(h).padStart(2,'0') + ":" +
        String(m).padStart(2,'0') + ":" +
        String(s).padStart(2,'0');
}

/* =========================
   START TIMER
========================= */

function startTimer(){

    if(timerInterval) return;

    document.getElementById("startBtn").style.display = "none";
    document.getElementById("breakBtn").style.display = "inline-block";

    timerInterval = setInterval(()=>{

        if(!isPaused){

            if(totalSeconds <= 0){
                clearInterval(timerInterval);
                totalSeconds = 0;
                updateDisplay();

                document.getElementById("timer").style.color = "red";
                document.getElementById("timer").style.borderColor = "red";
                document.getElementById("timeUpAlert").style.display = "block";
                document.getElementById("breakBtn").style.display = "none";

                return;
            }

            totalSeconds--;
            updateDisplay();
        }

    },1000);
}

function toggleBreak(){

    const breakBtn = document.getElementById("breakBtn");

    if(!isPaused){
        // Pause
        isPaused = true;
        breakBtn.innerText = "Resume";
    } else {
        // Resume
        isPaused = false;
        breakBtn.innerText = "Break";
    }
}

/* =========================
   MATRIX EFFECT (UNCHANGED)
========================= */

const canvas=document.getElementById("matrixCanvas");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize=16;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function drawMatrix(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00bfff";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
drops[i]++;
}}

setInterval(drawMatrix,50);

/* =========================
   DECRYPT EFFECT
========================= */

/* =========================
   DECRYPT EFFECT (FIXED)
========================= */

function decryptEffect(element){

    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    // 🔥 Store real original text only once
    const trueText = element.innerText;

    setInterval(()=>{

        let iterations = 0;

        const interval = setInterval(()=>{

            element.innerText = trueText.split("")
            .map((letter,index)=>{
                if(index < iterations) return trueText[index];
                return chars[Math.floor(Math.random()*chars.length)];
            }).join("");

            if(iterations >= trueText.length){
                clearInterval(interval);

                // 🔥 Force exact original text
                element.innerText = trueText;
            }

            iterations += 1/3;

        },30);

    },4000);
}
loadEvent().then(()=>{
    decryptEffect(document.getElementById("decryptText"));
    decryptEffect(document.getElementById("decryptMain"));
});
/* =========================
   INITIAL LOAD
========================= */

loadEvent();

</script>
</body>
</html>
